<!-- clients/templates/clients/client_list.html -->
{% extends "base.html" %}

{% block content %}
<h2>Clients</h2>
<a href="{% url 'clients:client_create' %}">Add New Client</a>
<ul>
    {% for client in clients %}
        <li>
            <a href="{% url 'clients:client_detail' client.id %}">{{ client.user.get_full_name }}</a>
            ({{ client.company_name }})
        </li>
    {% empty %}
        <li>No clients found.</li>
    {% endfor %}
</ul>
{% endblock %}
