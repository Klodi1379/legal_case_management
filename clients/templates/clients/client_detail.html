<!-- clients/templates/clients/client_detail.html -->
{% extends "base.html" %}

{% block content %}
<h2>Client Details</h2>
<p>Name: {{ client.user.get_full_name }}</p>
<p>Company: {{ client.company_name }}</p>
<p>Industry: {{ client.industry }}</p>
<p>Notes: {{ client.notes }}</p>
<a href="{% url 'clients:client_update' client.id %}">Edit Client</a>
<a href="{% url 'clients:client_list' %}">Back to Client List</a>
{% endblock %}
